# ==============================================================
# STEAM Data Engineering — dbt Project Configuration
# Proyecto: Civica | Mayo 2026
# ==============================================================

name: 'civica_steam'
version: '1.0.0'
config-version: 2

profile: 'default'

# ==============================================================
# Rutas del proyecto
# ==============================================================
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"

clean-targets:
  - "target"
  - "dbt_packages"

# ==============================================================
# Variables globales del proyecto
# ==============================================================
vars:
  min_date: '2020-01-01'
  steam_env: 'STEAM_DEV'

# ==============================================================
# Configuracion de modelos por capa
# ==============================================================
models:
  civica_steam:

    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging"]

    marts:
      +materialized: table
      +schema: marts
      +tags: ["marts"]

      core:
        +tags: ["core"]

        intermediate:
          +materialized: view
          +schema: intermediate
          +tags: ["intermediate"]