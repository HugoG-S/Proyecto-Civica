# ==============================================================
# STEAM Data Engineering — dbt Project Configuration
# Proyecto: Civica | Mayo 2026
# ==============================================================

name: 'civica_steam'
version: '1.0.0'
config-version: 2

profile: 'default'

# ==============================================================
# Rutas del proyecto
# ==============================================================
model-paths: ["models"]        # modelos SQL de transformacion
analysis-paths: ["analyses"]   # queries ad-hoc que no generan tablas
test-paths: ["tests"]          # tests de negocio personalizados
seed-paths: ["seeds"]          # archivos CSV estaticos (ej: catalogos)
macro-paths: ["macros"]        # funciones Jinja reutilizables
snapshot-paths: ["snapshots"]  # modelos SCD Type 2 (ej: dim_games)

target-path: "target"

clean-targets:
  - "target"
  - "dbt_packages"

# ==============================================================
# Variables globales del proyecto
# Accesibles desde cualquier modelo con {{ var('nombre') }}
# ==============================================================
vars:
  # Fecha minima para filtros en modelos incrementales
  min_date: '2020-01-01'

# ==============================================================
# Configuracion de modelos por capa
# Arquitectura medallion:
#   Bronze -> datos crudos (Python, no gestionado por dbt)
#   Silver -> staging + intermediate (vistas que limpian y enriquecen)
#   Gold   -> marts (dimensiones y facts para consumo BI)
#
# La variable DBT_STEAM_ENV controla el entorno:
#   DEV: DBT_STEAM_ENV=STEAM_DEV -> STEAM_DEV_SILVER / STEAM_DEV_GOLD
#   PRO: DBT_STEAM_ENV=STEAM_PRO -> STEAM_PRO_SILVER / STEAM_PRO_GOLD
# ==============================================================
models:
  civica_steam:

    staging:
      # Vista SQL - lee de Bronze y limpia el JSON VARIANT
      # Una vista por cada tabla RAW de Bronze
      # No aplica logica de negocio, solo limpieza y tipado
      +materialized: view
      # Dev:  STEAM_DEV_SILVER.DEV_STAGING
      # Prod: STEAM_PRO_SILVER.PRO_STAGING
      +database: "{{ env_var('DBT_STEAM_ENV', 'STEAM_DEV') ~ '_SILVER' }}"
      +schema: staging
      +tags: ["staging"]

    marts:
      # Tabla fisica - materializada en disco para queries rapidas
      # Aqui viven dims y facts del modelo dimensional
      +materialized: table
      # Dev:  STEAM_DEV_GOLD.DEV_MARTS
      # Prod: STEAM_PRO_GOLD.PRO_MARTS
      +database: "{{ env_var('DBT_STEAM_ENV', 'STEAM_DEV') ~ '_GOLD' }}"
      +schema: marts
      +tags: ["marts"]

      core:
        +tags: ["core"]

        intermediate:
          # Vista SQL dentro de marts - logica de negocio reutilizable
          # Une las tres fuentes por app_id antes de llegar a dims y facts
          # No esta pensada para consumo directo por BI
          +materialized: view
          # Dev:  STEAM_DEV_SILVER.DEV_INTERMEDIATE
          # Prod: STEAM_PRO_SILVER.PRO_INTERMEDIATE
          +database: "{{ env_var('DBT_STEAM_ENV', 'STEAM_DEV') ~ '_SILVER' }}"
          +schema: intermediate
          +tags: ["intermediate"]