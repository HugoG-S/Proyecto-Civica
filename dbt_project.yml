# ==============================================================
# STEAM Data Engineering — dbt Project Configuration
# Proyecto: Cívica | Mayo 2026
# ==============================================================

name: 'civica_steam'
version: '1.0.0'
config-version: 2

profile: 'default'

# ==============================================================
# Rutas del proyecto
# ==============================================================
model-paths: ["models"]        # modelos SQL de transformación
analysis-paths: ["analyses"]   # queries ad-hoc que no generan tablas
test-paths: ["tests"]          # tests de negocio personalizados
seed-paths: ["seeds"]          # archivos CSV estáticos (ej: catálogos)
macro-paths: ["macros"]        # funciones Jinja reutilizables
snapshot-paths: ["snapshots"]  # modelos SCD Type 2 (ej: dim_games)

target-path: "target"

clean-targets:
  - "target"
  - "dbt_packages"

# ==============================================================
# Variables globales del proyecto
# Accesibles desde cualquier modelo con {{ var('nombre') }}
# ==============================================================
vars:
  # Fecha mínima para filtros en modelos incrementales
  min_date: '2020-01-01'

# ==============================================================
# Configuración de modelos por capa
# Arquitectura medallion:
#   Bronze → datos crudos (Python, no gestionado por dbt)
#   Silver → staging (vistas que limpian Bronze)
#   Gold   → marts (dimensiones y facts para consumo BI)
# ==============================================================
models:
  civica_steam:

    staging:
      # Vista SQL — lee de Bronze y limpia el JSON VARIANT
      # Una vista por cada tabla RAW de Bronze
      # No aplica lógica de negocio, solo limpieza y tipado
      +materialized: view
      # Escribe en STEAM_DEV_SILVER.DEV_STAGING en desarrollo
      # Escribe en STEAM_PRO_SILVER.STAGING en producción
      +schema: staging
      # Permite ejecutar solo staging: dbt build --select tag:staging
      +tags: ["staging"]

    marts:
      # Tabla física — materializada en disco para queries rápidas
      # Aquí viven dims, facts e intermediate
      +materialized: table
      # Escribe en STEAM_DEV_SILVER.DEV_MARTS en desarrollo
      # Escribe en STEAM_PRO_SILVER.MARTS en producción
      +schema: marts
      +tags: ["marts"]

      core:
        +tags: ["core"]

        intermediate:
          # Vista SQL dentro de marts — lógica de negocio reutilizable
          # Une las tres fuentes por app_id antes de llegar a dims y facts
          # No está pensada para consumo directo por BI
          +materialized: view
          # Escribe en STEAM_DEV_SILVER.DEV_INTERMEDIATE en desarrollo
          +schema: intermediate
          +tags: ["intermediate"]