version: 2

models:
  - name: stg_steam_store__games
    description: >
      Vista que extrae la metadata oficial de la Steam Store API.
      Complementa a stg_steamspy__games con generos oficiales,
      categorias funcionales, plataformas, precios en EUR e idiomas.
      Una fila por juego.
    columns:

      - name: app_id
        description: "Identificador unico del juego en Steam. Natural key."
        tests:
          - unique
          - not_null

      - name: name
        description: "Nombre oficial del juego en la Steam Store."
        tests:
          - not_null

      - name: app_type
        description: "Tipo de aplicacion. Ej: game, dlc, demo, software."

      - name: short_description
        description: "Descripcion corta del juego en la Steam Store."

      - name: developer
        description: "Primer desarrollador del array de developers."

      - name: publisher
        description: "Primer publisher del array de publishers."

      - name: currency
        description: "Moneda del precio. EUR para consultas con cc=es."

      - name: price_eur
        description: "Precio actual en euros. NULL si el juego es Free to Play."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 999

      - name: initial_price_eur
        description: "Precio original en euros antes del descuento."

      - name: discount_pct
        description: "Porcentaje de descuento activo. 0 si no hay descuento."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

      - name: is_free
        description: "true si el juego es Free to Play."
        tests:
          - not_null

      - name: is_coming_soon
        description: "true si el juego aun no ha sido lanzado oficialmente."

      - name: is_early_access
        description: >
          true si el juego esta en Early Access.
          Se detecta comprobando si el genero Early Access esta
          presente en el array de generos oficiales de Valve.
        tests:
          - not_null
          - accepted_values:
              values: [true, false]

      - name: release_date_raw
        description: "Fecha de lanzamiento como string. Ej: 21 Aug, 2012."

      - name: genres_raw
        description: >
          Array VARIANT de generos oficiales de Valve.
          Formato: id y description por cada genero.
          Se desanidara en intermediate.

      - name: categories_raw
        description: >
          Array VARIANT de categorias funcionales.
          Ejemplos: Single-player, Co-op, Steam Achievements, VR Support.
          Se desanidara en intermediate.

      - name: platform_windows
        description: "true si el juego esta disponible en Windows."
        tests:
          - not_null

      - name: platform_mac
        description: "true si el juego esta disponible en Mac."
        tests:
          - not_null

      - name: platform_linux
        description: "true si el juego esta disponible en Linux."
        tests:
          - not_null

      - name: supported_languages_raw
        description: >
          String con idiomas soportados. Incluye marcadores de audio
          con formato especial. Se parseara en intermediate.

      - name: website
        description: "URL del sitio web oficial del juego. Puede ser NULL."

      - name: _ingested_at
        description: "Timestamp de cuando Python inserto el dato en Bronze."
        tests:
          - not_null

      - name: _loaded_at
        description: "Timestamp de cuando dbt proceso el modelo."
        tests:
          - not_null