version: 2

models:
  - name: stg_steam_store__games
    description: >
      Vista que extrae la metadata oficial de la Steam Store API.
      Complementa a stg_steamspy__games con géneros oficiales,
      categorías funcionales, plataformas, precios en EUR e idiomas.
      Una fila por juego.
    columns:

      - name: app_id
        description: "Identificador único del juego en Steam. Natural key."
        tests:
          - unique
          - not_null

      - name: name
        description: "Nombre oficial del juego en la Steam Store."
        tests:
          - not_null

      - name: app_type
        description: "Tipo de aplicación. Ej: game, dlc, demo, software."

      - name: short_description
        description: "Descripción corta del juego en la Steam Store."

      - name: developer
        description: "Primer desarrollador del array de developers."

      - name: publisher
        description: "Primer publisher del array de publishers."

      - name: currency
        description: "Moneda del precio. EUR para consultas con cc=es."

      - name: price_eur
        description: "Precio actual en euros. NULL si el juego es Free to Play."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 999

      - name: initial_price_eur
        description: "Precio original en euros antes del descuento."

      - name: discount_pct
        description: "Porcentaje de descuento activo. 0 si no hay descuento."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100

      - name: is_free
        description: "true si el juego es Free to Play."
        tests:
          - not_null

      - name: release_date_raw
        description: "Fecha de lanzamiento como string. Ej: '21 Aug, 2012'."

      - name: is_coming_soon
        description: "true si el juego aún no ha sido lanzado."

      - name: genres_raw
        description: >
          Array VARIANT de géneros oficiales de Valve.
          Formato: [{"id":"1","description":"Action"}, ...].
          Se desanidará en intermediate.

      - name: categories_raw
        description: >
          Array VARIANT de categorías funcionales.
          Ejemplos: Single-player, Co-op, Steam Achievements, VR Support.
          Se desanidará en intermediate.

      - name: platform_windows
        description: "true si el juego está disponible en Windows."
        tests:
          - not_null

      - name: platform_mac
        description: "true si el juego está disponible en Mac."
        tests:
          - not_null

      - name: platform_linux
        description: "true si el juego está disponible en Linux."
        tests:
          - not_null

      - name: supported_languages_raw
        description: >
          String con idiomas soportados. Incluye marcadores de audio
          con formato especial. Se parseará en intermediate.

      - name: website
        description: "URL del sitio web oficial del juego. Puede ser NULL."

      - name: _ingested_at
        description: "Timestamp de cuando Python insertó el dato en Bronze."
        tests:
          - not_null

      - name: _loaded_at
        description: "Timestamp de cuando dbt procesó el modelo."
        tests:
          - not_null